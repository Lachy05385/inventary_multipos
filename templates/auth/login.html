<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Inventarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: none;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card login-card">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                <i class="fas fa-warehouse fa-3x text-primary mb-3"></i>
                                <h2 class="card-title">Sistema de Inventarios</h2>
                                <p class="text-muted">Iniciar Sesión</p>
                            </div>

                            {% if message %}
                            <div class="alert alert-info alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                            {% endif %}

                            {% if error %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="fas fa-exclamation-triangle"></i> {{ error }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                            {% endif %}

                            <form method="POST" action="/auth/login">
                                <div class="mb-3">
                                    <label for="username" class="form-label">
                                        <i class="fas fa-user"></i> Usuario
                                    </label>
                                    <input type="text" class="form-control" id="username" name="username" required 
                                        value="{{ username if username else '' }}"
                                        placeholder="Ingresa tu usuario">
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">
                                        <i class="fas fa-lock"></i> Contraseña
                                    </label>
                                    <input type="password" class="form-control" id="password" name="password" required 
                                            placeholder="Ingresa tu contraseña">
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">
                                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                                    </button>
                                </div>
                            </form>

                            <div class="text-center mt-4">
                                <div class="card">
                                    <div class="card-body py-2">
                                        <small class="text-muted">
                                            <strong>Usuarios de prueba:</strong><br>
                                            <code>admin</code> / <code>Admin123!</code> (Administrador)<br>
                                            <code>almacen</code> / <code>Almacen123!</code> (Almacén)<br>
                                            <code>cajero</code> / <code>Cajero123!</code> (Cajero)
                                        </small>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center mt-3">
                                <a href="/test" class="text-muted">
                                    <i class="fas fa-arrow-left"></i> Volver al menú principal
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
